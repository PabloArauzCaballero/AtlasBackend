      security:
        - access-token: []
      summary: Listar logs sincronizados a MongoDB (Archivo.log remoto)
      tags:
        - systems-ops
info:
  title: Atlas API
  description: >-
    API de Proyecto Atlas — Fase 1 (usuarios): identidad de cliente,
    autenticación, sesiones, consentimientos, privacidad, telemetría,
    riesgo/scoring y plataforma administrativa. El dominio BNPL (compras,
    cuotas, línea de crédito, comercios) corresponde a Fase 3 y todavía no está
    implementado — ver docs/pending/pending-items.md.
  version: 0.2.0
  contact: {}
tags:
  - name: auth
    description: 'Autenticación: login, refresh, logout, provisión de credenciales internas.'
servers: []
components:
  securitySchemes:
    access-token:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas: {}
