            minimum: 1
            maximum: 100
        - name: tableType
          required: false
          in: query
          schema:
            type: string
            enum:
              - transactional
              - catalog
              - audit
              - operational
        - name: versionId
          required: false
          in: query
          schema:
            type: string
            pattern: ^\d+$
      responses:
        '200':
          description: Lista paginada de tablas.
      security:
        - access-token: []
      summary: Listar tablas del catálogo de esquema
      tags:
        - schema-management
    post:
      description: >-
        Registra una propuesta de cambio de esquema pendiente de aprobación (4
        ojos) por platform_admin.
      operationId: SchemaManagementController_proposeTable
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tableName:
                  type: string
                  minLength: 1
                  maxLength: 120
                  pattern: ^[a-z][a-z0-9_]*$
                tableType:
                  type: string
                  enum:
                    - transactional
                    - catalog
                    - audit
                    - operational
                isAppendOnly:
                  default: false
                  type: boolean
                isTenantScoped:
                  default: true
                  type: boolean
                description:
                  type: string
                  maxLength: 500
                columns:
                  minItems: 1
                  maxItems: 200
                  type: array
                  items:
                    type: object
                    properties:
                      columnName:
                        type: string
                        minLength: 1
                        maxLength: 120
                        pattern: ^_?[a-z][a-z0-9_]*$
                      columnType:
                        type: string
                        minLength: 1
                        maxLength: 60
                      isNullable:
                        default: false
                        type: boolean
                      isImmutable:
                        default: false
                        type: boolean
                      isPii:
                        default: false
                        type: boolean
                      isIndexed:
                        default: false
                        type: boolean
                      defaultValue:
                        type: string
                        maxLength: 255
                      description:
                        type: string
                        maxLength: 255
                    required:
                      - columnName
                      - columnType
                      - isNullable
                      - isImmutable
                      - isPii
                      - isIndexed
                    additionalProperties: false
                relationships:
                  default: []
                  type: array
                  items:
                    type: object
                    properties:
                      sourceColumnName:
                        type: string
                        minLength: 1
                        maxLength: 120
                        pattern: ^_?[a-z][a-z0-9_]*$
                      targetTableName:
                        type: string
                        minLength: 1
                        maxLength: 120
                        pattern: ^[a-z][a-z0-9_]*$
                      targetColumnName:
                        type: string
                        minLength: 1
                        maxLength: 120
                        pattern: ^_?[a-z][a-z0-9_]*$
                      cascadeDelete:
                        default: false
                        type: boolean
                    required:
                      - sourceColumnName
                      - targetTableName
                      - targetColumnName
                      - cascadeDelete
                    additionalProperties: false
                justification:
                  type: string
                  minLength: 10
                  maxLength: 1000
              required:
                - tableName
                - tableType
                - isAppendOnly
                - isTenantScoped
                - columns
                - relationships
                - justification
              additionalProperties: false
      responses:
        '201':
          description: Propuesta de tabla registrada.
      security:
        - access-token: []
      summary: Proponer una tabla nueva (solo-catálogo, no ejecuta DDL)
      tags:
        - schema-management
