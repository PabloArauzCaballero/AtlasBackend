            pattern: ^[1-9][0-9]*$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roles:
                  minItems: 1
                  maxItems: 8
                  type: array
                  items:
                    type: string
                    enum:
                      - SUPER_ADMIN
                      - SYSTEMS_ADMIN
                      - INTERNAL_IDENTITY_ADMIN
                      - OPERATIONS_MANAGER
                      - OPERATIONS_ANALYST
                      - RISK_MANAGER
                      - RISK_ANALYST
                      - FRAUD_ANALYST
                      - COMPLIANCE_MANAGER
                      - COMPLIANCE_ANALYST
                      - COLLECTIONS_MANAGER
                      - COLLECTIONS_AGENT
                      - FINANCE_MANAGER
                      - MERCHANT_OPERATIONS
                      - DATA_GOVERNANCE_MANAGER
                      - DATA_QUALITY_ANALYST
                      - QA_ENGINEER
                      - AUDITOR_READONLY
                      - SUPPORT_AGENT
                      - EXECUTIVE_READONLY
                reason:
