# Configuración documental. No es tabla SQL y no se lee en runtime.
# Este roadmap es la referencia oficial de fases del backend; cualquier cambio operativo debe
# mantenerse sincronizado con docs/pending/pending-items.md.

phases:
  - id: fase-1-usuarios
    name: "Fase 1 — Usuarios"
    status: in_progress
    description: >
      Identidad de cliente, autenticación, sesiones, consentimientos, privacidad y telemetría.
      Base de la que dependen las fases siguientes.
    modules:
      - auth
      - customers
      - customer-onboarding
      - customer-privacy
      - customer-telemetry
      - consents
      - sessions
      - notifications
      - events
      - runtime-hardening
      - runtime-jobs
      - health

  - id: fase-2-decision-y-admin
    name: "Fase 2 — Motor de decisión y plataforma administrativa"
    status: in_progress
    description: >
      Scoring/riesgo, catálogos versionados, panel interno de operaciones, calidad de datos y
      auditoría consolidada. Varios de estos módulos ya tienen una base funcional construida
      durante Fase 1; resta separar `fraud` de `risk` (ver ATLAS-PEND-107) y consolidar el
      panel administrativo como frente de producto propio (Next.js, ver
      FRONTEND_WEB_DEVELOPMENT_CONTEXT.md).
    modules:
      - risk
      - catalog-management
      - operations
      - data-quality
      - audit
      - fraud # Separación de risk registrada en ATLAS-PEND-107.

  - id: fase-3-deudas
    name: "Fase 3 — Deudas y otros (BNPL)"
    status: not_started
    description: >
      Dominio financiero central de Atlas: comercios, línea de crédito, compras 60/40, plan de
      3 cuotas, pagos, liquidaciones a comercio, MDR y cobranza/mora. No debe iniciarse hasta
      cerrar las 8 decisiones de negocio abiertas en PENDIENTES_ATLAS.md (ATLAS-PEND-001..008) y
      hasta que Fase 1 (auth real) y Fase 2 (motor de riesgo) estén suficientemente maduras,
      porque este dominio depende de ambas (snapshot de riesgo por compra, actores autenticados
      reales para comercio/operaciones).
    modules:
      - merchants
      - credit-lines
      - purchases
      - installment-plans
      - payments
      - merchant-settlements
      - collections
