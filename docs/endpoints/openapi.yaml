openapi: 3.0.0
paths:
  /operations/jobs/process-outbox:
    post:
      description: Job de mantenimiento. Restringido a admin/platform_admin/system.
      operationId: RuntimeJobsController_processOutbox
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  default: 50
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 500
                dryRun:
                  default: true
                  type: boolean
              required:
                - limit
                - dryRun
              additionalProperties: false
      responses:
        '200':
          description: Resultado del procesamiento del outbox.
      security:
        - access-token: []
      summary: Procesar el outbox de eventos pendientes
      tags:
        - runtime-jobs
  /operations/jobs/process-events:
    post:
      description: Job de mantenimiento. Restringido a admin/platform_admin/system.
      operationId: RuntimeJobsController_processEvents
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  default: 50
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 500
                dryRun:
                  default: true
                  type: boolean
              required:
                - limit
                - dryRun
              additionalProperties: false
      responses:
        '200':
          description: Resultado del procesamiento de eventos.
      security:
        - access-token: []
      summary: Procesar eventos de dominio pendientes
      tags:
        - runtime-jobs
  /operations/jobs/expire-stale-sessions:
    post:
      description: Job de mantenimiento. Restringido a admin/platform_admin/system.
      operationId: RuntimeJobsController_expireStaleSessions
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxIdleMinutes:
                  default: 120
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 43200
                dryRun:
                  default: true
                  type: boolean
              required:
                - maxIdleMinutes
                - dryRun
              additionalProperties: false
      responses:
        '200':
          description: Resultado de la expiración de sesiones.
      security:
        - access-token: []
      summary: Expirar sesiones inactivas
      tags:
        - runtime-jobs
  /operations/jobs/apply-retention-policies:
    post:
      description: Job de mantenimiento. Restringido a admin/platform_admin/system.
      operationId: RuntimeJobsController_applyRetentionPolicies
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyCode:
                  type: string
                  minLength: 1
                  maxLength: 120
                dryRun:
                  default: true
                  type: boolean
              required:
                - dryRun
              additionalProperties: false
      responses:
        '200':
          description: Resultado de la aplicación de políticas de retención.
      security:
        - access-token: []
      summary: Aplicar políticas de retención de datos
      tags:
        - runtime-jobs
  /operations/jobs/recalculate-data-quality:
    post:
      description: Job de mantenimiento. Restringido a admin/platform_admin/system.
      operationId: RuntimeJobsController_recalculateDataQuality
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                dryRun:
                  default: true
                  type: boolean
              required:
                - dryRun
              additionalProperties: false
      responses:
        '200':
          description: Resultado del recálculo de calidad de datos.
      security:
        - access-token: []
      summary: Recalcular métricas de calidad de datos
      tags:
        - runtime-jobs
  /operations/events/catalog:
    get:
      operationId: EventsController_listCatalog
      parameters: []
      responses:
        '200':
          description: Lista de definiciones de eventos registradas.
      security:
        - access-token: []
      summary: Catálogo de definiciones de eventos de dominio
      tags:
        - events
  /operations/events:
    get:
      description: >-
        Soporta paginación por offset (page/limit) o por cursor
        (pagination=cursor).
      operationId: EventsController_listEvents
      parameters:
        - name: cursor
          required: false
          in: query
          schema:
            type: string
            maxLength: 500
        - name: pagination
          required: false
          in: query
          schema:
            default: offset
            type: string
            enum:
              - offset
              - cursor
        - name: limit
          required: false
          in: query
          schema:
            default: 20
            type: integer
            exclusiveMinimum: 0
            maximum: 100
        - name: page
          required: false
          in: query
          schema:
            default: 1
            type: integer
            exclusiveMinimum: 0
            maximum: 9007199254740991
        - name: correlationId
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: aggregateType
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: eventCode
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 160
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - pending
              - processing
              - processed
              - failed
              - cancelled
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de eventos.
      security:
        - access-token: []
      summary: Listar eventos de dominio (outbox)
      tags:
        - events
    post:
      operationId: EventsController_createEvent
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventCode:
                  type: string
                  minLength: 3
                  maxLength: 160
                aggregateType:
                  type: string
                  minLength: 2
                  maxLength: 120
                aggregateId:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: 'null'
                payload:
                  default: {}
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                metadata:
                  default: {}
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                priority:
                  type: integer
                  minimum: 0
                  maximum: 1000
                availableAt: {}
                maxAttempts:
                  default: 3
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 10
                idempotencyKey:
                  type: string
                  minLength: 8
                  maxLength: 180
                correlationId:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: 'null'
                causationId:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: 'null'
                sourceModule:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: 'null'
                sourceAction:
                  anyOf:
                    - type: string
                      maxLength: 120
                    - type: 'null'
              required:
                - eventCode
                - aggregateType
                - payload
                - metadata
                - maxAttempts
              additionalProperties: false
      responses:
        '201':
          description: Evento publicado (encolado en outbox).
      security:
        - access-token: []
      summary: Publicar un evento de dominio
      tags:
        - events
  /operations/events/{eventId}:
    get:
      operationId: EventsController_getEvent
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle del evento.
        '404':
          description: EVENT_NOT_FOUND.
      security:
        - access-token: []
      summary: Obtener un evento de dominio
      tags:
        - events
  /operations/events/{eventId}/retry:
    post:
      operationId: EventsController_retryEvent
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evento re-encolado para reintento.
        '404':
          description: EVENT_NOT_FOUND.
        '409':
          description: EVENT_NOT_RETRYABLE.
      security:
        - access-token: []
      summary: Reintentar un evento fallido
      tags:
        - events
  /operations/events/{eventId}/cancel:
    post:
      operationId: EventsController_cancelEvent
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evento cancelado.
        '404':
          description: EVENT_NOT_FOUND.
        '409':
          description: EVENT_NOT_CANCELLABLE.
      security:
        - access-token: []
      summary: Cancelar un evento pendiente
      tags:
        - events
  /operations/notifications/messages:
    get:
      operationId: NotificationsController_listMessages
      parameters:
        - name: channel
          required: false
          in: query
          schema:
            type: string
            enum:
              - in_app
              - push
              - email
              - sms
              - whatsapp
              - phone
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - pending
              - queued
              - sending
              - sent
              - delivered
              - read
              - failed
              - retrying
              - cancelled
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de mensajes.
      security:
        - access-token: []
      summary: Listar mensajes de notificación (operaciones)
      tags:
        - notifications
  /operations/notifications/messages/{messageId}:
    get:
      description: Incluye el historial de intentos de entrega (deliveries) del mensaje.
      operationId: NotificationsController_getMessage
      parameters:
        - name: messageId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle del mensaje con sus deliveries.
        '404':
          description: NOTIFICATION_MESSAGE_NOT_FOUND.
      security:
        - access-token: []
      summary: Detalle de un mensaje de notificación (operaciones)
      tags:
        - notifications
  /operations/notifications/messages/{messageId}/retry:
    post:
      operationId: NotificationsController_retryMessage
      parameters:
        - name: messageId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reintento encolado — devuelve el mensaje actualizado.
        '400':
          description: X-Idempotency-Key ausente.
        '404':
          description: NOTIFICATION_MESSAGE_NOT_FOUND.
      security:
        - access-token: []
      summary: Reintentar entrega de un mensaje fallido
      tags:
        - notifications
  /operations/notifications/messages/{messageId}/cancel:
    post:
      operationId: NotificationsController_cancelMessage
      parameters:
        - name: messageId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mensaje cancelado.
        '400':
          description: SENT_MESSAGE_CANNOT_BE_CANCELLED — el mensaje ya fue enviado.
        '404':
          description: NOTIFICATION_MESSAGE_NOT_FOUND.
      security:
        - access-token: []
      summary: Cancelar un mensaje de notificación pendiente
      tags:
        - notifications
  /operations/notifications/templates:
    get:
      operationId: NotificationsController_listTemplates
      parameters:
        - name: active
          required: false
          in: query
          schema:
            type: boolean
        - name: channel
          required: false
          in: query
          schema:
            type: string
            enum:
              - in_app
              - push
              - email
              - sms
              - whatsapp
              - phone
        - name: code
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 160
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de plantillas.
      security:
        - access-token: []
      summary: Listar plantillas de notificación
      tags:
        - notifications
    post:
      operationId: NotificationsController_createTemplate
      parameters:
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 3
                  maxLength: 160
                channel:
                  type: string
                  enum:
                    - in_app
                    - push
                    - email
                    - sms
                    - whatsapp
                    - phone
                locale:
                  default: es-BO
                  type: string
                  minLength: 2
                  maxLength: 12
                titleTemplate:
                  anyOf:
                    - type: string
                      maxLength: 400
                    - type: 'null'
                subjectTemplate:
                  anyOf:
                    - type: string
                      maxLength: 400
                    - type: 'null'
                bodyTemplate:
                  type: string
                  minLength: 1
                  maxLength: 5000
                payloadSchema:
                  anyOf:
                    - type: object
                      propertyNames:
                        type: string
                      additionalProperties: {}
                    - type: 'null'
                isActive:
                  default: true
                  type: boolean
                version:
                  default: 1
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
              required:
                - code
                - channel
                - locale
                - bodyTemplate
                - isActive
                - version
              additionalProperties: false
      responses:
        '201':
          description: Plantilla creada.
        '400':
          description: X-Idempotency-Key ausente.
      security:
        - access-token: []
      summary: Crear plantilla de notificación
      tags:
        - notifications
  /operations/notifications/templates/{templateId}:
    patch:
      operationId: NotificationsController_updateTemplate
      parameters:
        - name: templateId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 3
                  maxLength: 160
                channel:
                  type: string
                  enum:
                    - in_app
                    - push
                    - email
                    - sms
                    - whatsapp
                    - phone
                locale:
                  default: es-BO
                  type: string
                  minLength: 2
                  maxLength: 12
                titleTemplate:
                  anyOf:
                    - type: string
                      maxLength: 400
                    - type: 'null'
                subjectTemplate:
                  anyOf:
                    - type: string
                      maxLength: 400
                    - type: 'null'
                bodyTemplate:
                  type: string
                  minLength: 1
                  maxLength: 5000
                payloadSchema:
                  anyOf:
                    - type: object
                      propertyNames:
                        type: string
                      additionalProperties: {}
                    - type: 'null'
                isActive:
                  default: true
                  type: boolean
                version:
                  default: 1
                  type: integer
                  exclusiveMinimum: 0
                  maximum: 9007199254740991
              additionalProperties: false
      responses:
        '200':
          description: Plantilla actualizada.
        '404':
          description: NOTIFICATION_TEMPLATE_NOT_FOUND.
      security:
        - access-token: []
      summary: Editar plantilla de notificación
      tags:
        - notifications
  /operations/notifications/preferences/{customerId}:
    get:
      operationId: NotificationsController_getPreferences
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preferencias del cliente por evento/canal.
      security:
        - access-token: []
      summary: Preferencias de notificación de un cliente (operaciones)
      tags:
        - notifications
    patch:
      description: >-
        No puede desactivar notificaciones marcadas como requeridas
        (REQUIRED_NOTIFICATION_CANNOT_BE_DISABLED).
      operationId: NotificationsController_updatePreferences
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences:
                  minItems: 1
                  maxItems: 100
                  type: array
                  items:
                    type: object
                    properties:
                      eventCode:
                        type: string
                        minLength: 3
                        maxLength: 160
                      channel:
                        type: string
                        enum:
                          - in_app
                          - push
                          - email
                          - sms
                          - whatsapp
                          - phone
                      isEnabled:
                        type: boolean
                      isRequired:
                        default: false
                        type: boolean
                    required:
                      - eventCode
                      - channel
                      - isEnabled
                      - isRequired
                    additionalProperties: false
              required:
                - preferences
              additionalProperties: false
      responses:
        '200':
          description: Preferencias actualizadas.
        '400':
          description: REQUIRED_NOTIFICATION_CANNOT_BE_DISABLED.
      security:
        - access-token: []
      summary: Editar preferencias de notificación de un cliente (operaciones)
      tags:
        - notifications
  /customers/{customerId}/notifications:
    get:
      operationId: NotificationsController_listCustomerNotifications
      parameters:
        - name: channel
          required: false
          in: query
          schema:
            type: string
            enum:
              - in_app
              - push
              - email
              - sms
              - whatsapp
              - phone
        - name: status
          required: false
          in: query
          schema:
            type: string
            enum:
              - pending
              - queued
              - sending
              - sent
              - delivered
              - read
              - failed
              - retrying
              - cancelled
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          description: Opcional para customer (se toma del token).
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de notificaciones del cliente.
        '403':
          description: CUSTOMER_NOTIFICATION_ACCESS_DENIED.
      security:
        - access-token: []
      summary: Listar notificaciones del cliente (autoservicio)
      tags:
        - notifications
  /customers/{customerId}/notifications/unread-count:
    get:
      operationId: NotificationsController_unreadCount
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Cantidad de notificaciones no leídas.
        '403':
          description: CUSTOMER_NOTIFICATION_ACCESS_DENIED.
      security:
        - access-token: []
      summary: Contador de notificaciones no leídas del cliente
      tags:
        - notifications
  /customers/{customerId}/notifications/{notificationId}/read:
    post:
      operationId: NotificationsController_markRead
      parameters:
        - name: notificationId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Notificación marcada como leída.
        '403':
          description: CUSTOMER_NOTIFICATION_ACCESS_DENIED.
        '404':
          description: CUSTOMER_NOTIFICATION_NOT_FOUND.
      security:
        - access-token: []
      summary: Marcar una notificación como leída
      tags:
        - notifications
  /customers/{customerId}/notifications/read-all:
    post:
      operationId: NotificationsController_markAllRead
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Cantidad de notificaciones actualizadas.
        '403':
          description: CUSTOMER_NOTIFICATION_ACCESS_DENIED.
      security:
        - access-token: []
      summary: Marcar todas las notificaciones del cliente como leídas
      tags:
        - notifications
  /customers/{customerId}/device-tokens:
    post:
      description: >-
        Registra el token FCM/APNs del dispositivo del cliente para poder
        enviarle notificaciones push.
      operationId: NotificationsController_upsertDeviceToken
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform:
                  type: string
                  enum:
                    - ios
                    - android
                    - web
                token:
                  type: string
                  minLength: 8
                  maxLength: 500
                deviceId:
                  anyOf:
