        - name: q
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - name: service
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: type
          required: false
          in: query
          schema:
            type: string
            enum:
              - startup
              - append
              - rotation
