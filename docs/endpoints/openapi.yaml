  /customer-onboarding/start:
    post:
      description: >-
        Crea el registro de cliente, sus credenciales (si se envió contraseña) y
        registra los consentimientos iniciales requeridos, todo en una única
        transacción. Endpoint público (sin token) — limitado a 10 intentos por
        minuto por IP para prevenir enumeración/abuso. Requiere consentimientos
        otorgados (`REQUIRED_CONSENT_MISSING` si falta alguno obligatorio).
      operationId: CustomerOnboardingController_startOnboarding
      parameters:
        - name: x-idempotency-key
          in: header
          description: Evita crear el mismo cliente dos veces ante un reintento.
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          description: Tenant en el que se registra el cliente.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    phone:
                      type: string
                      minLength: 6
                      maxLength: 40
                    email:
                      type: string
                      maxLength: 180
                      format: email
                      pattern: >-
                        ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                    firstName:
                      type: string
                      minLength: 1
                      maxLength: 120
                    lastName:
                      type: string
                      minLength: 1
                      maxLength: 120
                    birthDate:
                      type: string
                      pattern: ^\d{4}-\d{2}-\d{2}$
                  additionalProperties: false
                password:
                  type: string
                  minLength: 10
                  maxLength: 128
                consents:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      consentDocumentId:
                        type: string
                        pattern: ^[1-9][0-9]*$
                      purposeCode:
                        type: string
                        minLength: 1
                        maxLength: 80
                      granted:
                        type: boolean
                      acceptedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    required:
                      - consentDocumentId
                      - purposeCode
                      - granted
                    additionalProperties: false
                device:
                  type: object
                  properties:
                    deviceFingerprintHash:
                      type: string
                      minLength: 32
                      maxLength: 128
                    fingerprintVersion:
                      default: v1
                      type: string
                      minLength: 1
                      maxLength: 40
                    channel:
                      type: string
                      enum:
                        - mobile_app
                        - web_app
                    userAgent:
                      type: string
                      maxLength: 500
                    snapshot:
                      type: object
                      properties:
                        brand:
                          type: string
                          maxLength: 80
                        model:
                          type: string
                          maxLength: 120
                        osFamily:
                          type: string
                          maxLength: 40
                        osVersion:
                          type: string
                          maxLength: 60
                        appVersion:
                          type: string
                          maxLength: 60
                        isRooted:
                          type: boolean
                        isEmulator:
                          type: boolean
                        vpnDetected:
                          type: boolean
                        timezone:
                          type: string
                          maxLength: 60
                        locale:
                          type: string
                          maxLength: 20
                      additionalProperties: false
                  required:
                    - deviceFingerprintHash
                    - fingerprintVersion
                    - channel
                  additionalProperties: false
                permissions:
                  type: array
                  items:
                    type: object
                    properties:
                      permissionCode:
                        type: string
                        enum:
                          - location
                          - camera
                          - contacts
                          - notifications
                          - storage
                      granted:
                        type: boolean
                      decidedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    required:
                      - permissionCode
                      - granted
                    additionalProperties: false
                onboarding:
                  type: object
                  properties:
                    sourceType:
                      default: mobile_app
                      type: string
                      minLength: 1
                      maxLength: 40
                    startedStepCode:
                      type: string
                      minLength: 1
                      maxLength: 80
                  required:
                    - sourceType
                  additionalProperties: false
              required:
                - customer
                - consents
                - device
              additionalProperties: false
      responses:
        '201':
          description: >-
            Cliente creado — devuelve el id del cliente y el estado inicial de
            onboarding.
        '400':
          description: x-tenant-id/x-idempotency-key ausente, o body inválido.
        '409':
          description: >-
            CUSTOMER_ALREADY_EXISTS — ya existe un cliente con el mismo
            teléfono/email en este tenant.
        '422':
          description: >-
            REQUIRED_CONSENT_MISSING — falta otorgar un consentimiento
            obligatorio.
      summary: Iniciar onboarding de un cliente nuevo
      tags:
        - customer-onboarding
  /customer-onboarding/{customerId}/contact-verification/request:
    post:
      description: >-
        Envía un código de verificación (SMS/email, según el contacto) al método
        de contacto indicado del cliente.
      operationId: CustomerOnboardingController_requestContactVerification
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contactType:
                  type: string
                  enum:
                    - phone
                    - email
                verificationChannel:
                  type: string
                  enum:
                    - sms
                    - email
                    - whatsapp
                sessionId:
                  type: string
                  pattern: ^[1-9][0-9]*$
              required:
                - contactType
                - verificationChannel
              additionalProperties: false
      responses:
        '202':
          description: Código de verificación enviado.
        '403':
          description: El token no permite operar sobre este cliente.
        '404':
          description: Cliente no encontrado.
        '409':
          description: >-
            VERIFICATION_RATE_LIMITED — demasiados intentos recientes para este
            contacto.
        '422':
          description: >-
            CONTACT_NOT_REGISTERED — el contacto indicado no está registrado
            para este cliente.
      security:
        - access-token: []
      summary: Solicitar código de verificación de contacto (OTP)
      tags:
        - customer-onboarding
  /customer-onboarding/{customerId}/contact-verification/submit:
    post:
      description: >-
        Valida el código recibido por SMS/email contra el intento de
        verificación pendiente más reciente.
      operationId: CustomerOnboardingController_submitContactVerification
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contactType:
                  type: string
                  enum:
                    - phone
                    - email
                verificationChannel:
                  type: string
                  enum:
                    - sms
                    - email
                    - whatsapp
                verificationCode:
                  type: string
                  minLength: 4
                  maxLength: 12
                sessionId:
                  type: string
                  pattern: ^[1-9][0-9]*$
              required:
                - contactType
                - verificationChannel
                - verificationCode
              additionalProperties: false
      responses:
        '200':
          description: Contacto verificado correctamente.
        '401':
          description: INVALID_VERIFICATION_CODE o VERIFICATION_CODE_EXPIRED.
        '403':
          description: El token no permite operar sobre este cliente.
        '404':
          description: >-
            VERIFICATION_ATTEMPT_NOT_FOUND — no hay un intento de verificación
            pendiente.
        '409':
          description: CONTACT_ALREADY_VERIFIED — el contacto ya estaba verificado.
      security:
        - access-token: []
      summary: Confirmar código de verificación de contacto (OTP)
      tags:
        - customer-onboarding
  /customer-onboarding/{customerId}/identity-package:
    post:
      description: >-
        Registra los documentos de identidad y evidencia biométrica del cliente
        para su revisión/scoring de riesgo.
      operationId: CustomerOnboardingController_submitIdentityPackage
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identity:
                  type: object
                  properties:
                    documentType:
                      type: string
                      enum:
                        - ci
                        - passport
                        - foreign_id
                    documentNumberHash:
                      type: string
                      minLength: 32
                      maxLength: 128
                    documentLast4:
                      type: string
                      minLength: 2
                      maxLength: 4
                    countryCode:
                      default: BOL
                      type: string
                      minLength: 3
                      maxLength: 3
                    issuedIn:
                      type: string
                      maxLength: 60
                    issuedAt:
                      type: string
                      pattern: ^\d{4}-\d{2}-\d{2}$
                    expiresAt:
                      type: string
                      pattern: ^\d{4}-\d{2}-\d{2}$
                  required:
                    - documentType
                    - documentNumberHash
                    - documentLast4
                    - countryCode
                  additionalProperties: false
                evidence:
                  minItems: 1
                  maxItems: 5
                  type: array
                  items:
                    type: object
                    properties:
                      evidenceType:
                        type: string
                        enum:
                          - identity_front
                          - identity_back
                          - selfie
                          - proof_of_address
                          - other
                      storageKey:
                        type: string
                        minLength: 8
                        maxLength: 500
                      mimeType:
                        type: string
                        enum:
                          - image/jpeg
                          - image/png
                          - application/pdf
                      sha256Hash:
                        type: string
                        minLength: 32
                        maxLength: 128
                      fileSizeBytes:
                        type: string
                        pattern: ^[1-9][0-9]*$
                    required:
                      - evidenceType
                      - storageKey
                      - mimeType
                      - sha256Hash
                    additionalProperties: false
                provider:
                  type: object
                  properties:
                    providerCode:
                      type: string
                      minLength: 1
                      maxLength: 80
                    requestPayloadHash:
                      type: string
                      minLength: 32
                      maxLength: 128
                  required:
                    - providerCode
                  additionalProperties: false
                sessionId:
                  type: string
                  pattern: ^[1-9][0-9]*$
              required:
                - identity
                - evidence
              additionalProperties: false
      responses:
        '202':
          description: Paquete de identidad recibido y encolado para procesamiento.
        '403':
          description: El token no permite operar sobre este cliente.
        '404':
          description: Cliente no encontrado.
        '422':
          description: >-
            CUSTOMER_BLOCKED, REQUIRED_EVIDENCE_MISSING, o
            REQUIRED_CONSENT_MISSING.
      security:
        - access-token: []
      summary: Enviar paquete de identidad (documentos + selfie)
      tags:
        - customer-onboarding
  /customer-onboarding/{customerId}/address-package:
    post:
      description: >-
        Registra la dirección declarada del cliente (y evidencia
        GPS/geolocalización cuando corresponda).
      operationId: CustomerOnboardingController_submitAddressPackage
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: object
                  properties:
                    countryCode:
                      default: BOL
                      type: string
                      minLength: 3
                      maxLength: 3
                    department:
                      type: string
                      minLength: 1
                      maxLength: 80
                    city:
                      type: string
                      minLength: 1
                      maxLength: 120
                    zone:
                      type: string
                      maxLength: 120
                    addressLineEncrypted:
                      type: string
                      maxLength: 500
                    referenceEncrypted:
                      type: string
                      maxLength: 500
                  required:
                    - countryCode
                    - department
                    - city
                  additionalProperties: false
                gpsObservation:
                  type: object
                  properties:
                    lat:
                      type: number
                      minimum: -90
                      maximum: 90
                    lng:
                      type: number
                      minimum: -180
                      maximum: 180
                    accuracyMeters:
                      type: number
                      exclusiveMinimum: 0
                      maximum: 10000
                    capturedAt:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  required:
                    - lat
                    - lng
                  additionalProperties: false
                sessionId:
                  type: string
                  pattern: ^[1-9][0-9]*$
              required:
                - address
              additionalProperties: false
      responses:
        '200':
          description: Paquete de dirección registrado.
        '403':
          description: El token no permite operar sobre este cliente.
        '404':
          description: Cliente no encontrado.
        '422':
          description: CUSTOMER_BLOCKED o REQUIRED_EVIDENCE_MISSING.
      security:
        - access-token: []
      summary: Enviar paquete de dirección
      tags:
        - customer-onboarding
  /customers/{customerId}/sessions/start:
    post:
      description: >-
        Abre una nueva sesión (login en la app móvil/web del cliente) asociada a
        un dispositivo. Un `customer` solo puede abrir sesiones para sí mismo
        (`assertOwnCustomerResource`); los roles internos pueden operar en
        nombre de cualquier cliente.
      operationId: CustomerSessionsController_startSession
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                device:
                  type: object
                  properties:
                    deviceFingerprintHash:
                      type: string
                      minLength: 8
                      maxLength: 180
                    fingerprintVersion:
                      default: v1
                      type: string
                      minLength: 1
                      maxLength: 60
                    channel:
                      default: mobile_app
                      type: string
                      enum:
                        - mobile_app
                        - web_app
                        - operations_panel
                        - system
                    userAgent:
                      type: string
                      maxLength: 1000
                    snapshot:
                      type: object
                      properties:
                        brand:
                          type: string
                          maxLength: 100
                        model:
                          type: string
                          maxLength: 160
                        osFamily:
                          type: string
                          maxLength: 40
                        osVersion:
                          type: string
                          maxLength: 80
                        appVersion:
                          type: string
                          maxLength: 80
                        isRooted:
                          type: boolean
                        isEmulator:
                          type: boolean
                        vpnDetected:
                          type: boolean
                      additionalProperties: false
                  required:
                    - deviceFingerprintHash
                    - fingerprintVersion
                    - channel
                  additionalProperties: false
                authMethod:
                  default: app_session
                  type: string
                  minLength: 1
                  maxLength: 60
                sessionTokenHash:
                  type: string
                  maxLength: 128
                gpsObservation:
                  type: object
                  properties:
                    lat:
                      type: number
                      minimum: -90
                      maximum: 90
                    lng:
                      type: number
                      minimum: -180
                      maximum: 180
                    accuracyMeters:
                      type: number
                      minimum: 0
                      maximum: 10000
                    capturedAt:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  required:
                    - lat
                    - lng
                  additionalProperties: false
                permissions:
                  default: []
                  maxItems: 30
                  type: array
                  items:
                    type: object
                    properties:
                      permissionCode:
                        type: string
                        minLength: 1
                        maxLength: 80
                      granted:
                        type: boolean
                      decidedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    required:
                      - permissionCode
                      - granted
                    additionalProperties: false
                locationPermissionGranted:
                  type: boolean
                simObservation:
                  type: object
                  properties:
                    phoneNumberHash:
                      type: string
                      maxLength: 128
                    phoneLast4:
                      type: string
                      pattern: ^[0-9]{4}$
                    carrierName:
                      type: string
                      maxLength: 80
                    simType:
                      type: string
                      maxLength: 40
                    simCount:
                      type: integer
                      minimum: 0
                      maximum: 10
                  additionalProperties: false
                ipReputation:
                  type: object
                  properties:
                    isVpn:
                      type: boolean
                    isProxy:
                      type: boolean
                    isTor:
                      type: boolean
                    countryCode:
                      type: string
                      minLength: 2
                      maxLength: 2
                    city:
                      type: string
                      maxLength: 120
                    reputationScore:
                      type: number
                      minimum: 0
                      maximum: 1
                  additionalProperties: false
              required:
                - device
                - authMethod
                - permissions
              additionalProperties: false
      responses:
        '201':
          description: Sesión creada.
        '400':
          description: X-Idempotency-Key ausente, o x-tenant-id inválido.
        '403':
          description: El dispositivo no está vinculado al cliente.
        '404':
          description: Cliente o dispositivo no encontrado.
        '422':
          description: CUSTOMER_BLOCKED — el cliente está bloqueado.
      security:
        - access-token: []
      summary: Iniciar una sesión de cliente
      tags:
        - sessions
  /customers/{customerId}/sessions/{sessionId}/heartbeat:
    post:
      description: >-
        Señal periódica de actividad de una sesión abierta (mantiene la sesión
        viva y actualiza GPS/telemetría de dispositivo). Valida que el
        `deviceId` enviado coincida con el de la sesión.
      operationId: CustomerSessionsController_heartbeat
      parameters:
        - name: sessionId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                clientHeartbeatId:
                  type: string
                  minLength: 1
                  maxLength: 120
                capturedAt:
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                gpsObservation:
                  type: object
                  properties:
                    lat:
                      type: number
                      minimum: -90
                      maximum: 90
                    lng:
                      type: number
                      minimum: -180
                      maximum: 180
                    accuracyMeters:
                      type: number
                      minimum: 0
                      maximum: 10000
                    capturedAt:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  required:
                    - lat
                    - lng
                  additionalProperties: false
                permissionChanges:
                  default: []
                  maxItems: 30
                  type: array
                  items:
                    type: object
                    properties:
                      permissionCode:
                        type: string
                        minLength: 1
                        maxLength: 80
                      granted:
                        type: boolean
                      decidedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    required:
                      - permissionCode
                      - granted
                    additionalProperties: false
                locationPermissionGranted:
                  type: boolean
                deviceSnapshot:
                  type: object
                  properties:
                    brand:
                      type: string
                      maxLength: 100
                    model:
                      type: string
                      maxLength: 160
                    osFamily:
                      type: string
                      maxLength: 40
                    osVersion:
                      type: string
                      maxLength: 80
                    appVersion:
                      type: string
                      maxLength: 80
                    isRooted:
                      type: boolean
                    isEmulator:
                      type: boolean
                    vpnDetected:
                      type: boolean
                  additionalProperties: false
                simObservation:
                  type: object
                  properties:
                    phoneNumberHash:
                      type: string
                      maxLength: 128
                    phoneLast4:
                      type: string
                      pattern: ^[0-9]{4}$
                    carrierName:
                      type: string
                      maxLength: 80
                    simType:
                      type: string
                      maxLength: 40
                    simCount:
                      type: integer
                      minimum: 0
                      maximum: 10
                  additionalProperties: false
                ipReputation:
                  type: object
                  properties:
                    isVpn:
                      type: boolean
                    isProxy:
                      type: boolean
                    isTor:
                      type: boolean
                    countryCode:
                      type: string
                      minLength: 2
                      maxLength: 2
                    city:
                      type: string
                      maxLength: 120
                    reputationScore:
                      type: number
                      minimum: 0
                      maximum: 1
                  additionalProperties: false
              required:
                - deviceId
                - clientHeartbeatId
                - permissionChanges
              additionalProperties: false
      responses:
        '202':
          description: Heartbeat registrado.
        '403':
          description: El dispositivo no corresponde a la sesión.
        '404':
          description: Sesión no encontrada.
        '422':
          description: SESSION_NOT_ACTIVE — la sesión ya no está activa.
      security:
        - access-token: []
      summary: Heartbeat de sesión
      tags:
        - sessions
  /customers/{customerId}/sessions/{sessionId}/end:
    post:
      description: Termina explícitamente una sesión abierta (logout).
      operationId: CustomerSessionsController_endSession
      parameters:
        - name: sessionId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                endedAt:
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                reasonCode:
                  default: customer_logout
                  type: string
                  minLength: 1
                  maxLength: 80
              required:
                - reasonCode
              additionalProperties: false
      responses:
        '200':
          description: Sesión cerrada.
        '403':
          description: El dispositivo no corresponde a la sesión.
        '404':
          description: Sesión no encontrada.
      security:
        - access-token: []
      summary: Cerrar sesión
      tags:
        - sessions
  /customers/{customerId}/session-state:
    get:
      description: >-
        Devuelve si el cliente tiene una sesión activa en este momento y su
        resumen (dispositivo, inicio, última actividad).
      operationId: CustomerSessionsController_getSessionState
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Estado de sesión (puede no haber ninguna sesión activa).
        '404':
          description: Cliente no encontrado.
      security:
        - access-token: []
      summary: Estado de sesión actual del cliente
      tags:
        - sessions
  /operations/sessions/{sessionId}/investigation-summary:
    get:
      description: >-
        Vista interna de una sesión para investigación de fraude/soporte:
        dispositivo, GPS, eventos de riesgo, y actividad asociada.
        Exclusivamente para roles internos — nunca para `customer` (a diferencia
        de los endpoints de `CustomerSessionsController`).
      operationId: OperationsSessionsController_getInvestigationSummary
      parameters:
        - name: sessionId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resumen de investigación de la sesión.
        '404':
          description: Sesión no encontrada.
      security:
        - access-token: []
      summary: Resumen de investigación de una sesión (operaciones)
      tags:
        - sessions
  /consent-documents/active:
    get:
      description: >-
        Devuelve los documentos legales (términos, política de privacidad, etc.)
        publicados y vigentes para el tenant/idioma dado. Endpoint público (sin
        token) — se consulta antes del login, durante onboarding. `purposeCode`
        filtra por `documentCode` (el nombre del parámetro no corresponde 1:1 al
        propósito de negocio real, ver `consents.schemas.ts`).
      operationId: ConsentsController_listActiveDocuments
      parameters:
        - name: purposeCode
          required: false
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 80
        - name: language
          required: false
          in: query
          schema:
            default: es
            type: string
            minLength: 2
            maxLength: 10
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de documentos activos (puede ser vacía).
        '400':
          description: x-tenant-id ausente o inválido.
      summary: Listar documentos de consentimiento activos
      tags:
        - consents
  /customers/{customerId}/privacy/consent-decisions:
    post:
      description: >-
        Registra hasta 20 decisiones de consentimiento
        (otorgado/rechazado/revocado) en una sola llamada transaccional. Si
        alguna decisión es `revoked`, se crea automáticamente un evento de
        cambio de estado del cliente (`requires_review`). Cada
        `consentDocumentId` se valida contra el catálogo de documentos activos
        antes de escribir.
      operationId: CustomerPrivacyController_registerConsentDecisions
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-client-channel
          in: header
          description: 'Canal de origen (default: mobile_app).'
          required: false
          schema:
            type: string
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decisions:
                  minItems: 1
                  maxItems: 20
                  type: array
                  items:
                    type: object
                    properties:
                      consentDocumentId:
                        type: string
                        pattern: ^[1-9][0-9]*$
                      purposeCode:
                        type: string
                        minLength: 1
                        maxLength: 80
                      decision:
                        type: string
                        enum:
                          - granted
                          - declined
                          - revoked
                      decidedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      sessionId:
                        type: string
                        pattern: ^[1-9][0-9]*$
                    required:
                      - consentDocumentId
                      - purposeCode
                      - decision
                    additionalProperties: false
              required:
                - decisions
              additionalProperties: false
      responses:
        '200':
          description: >-
            Decisiones procesadas — cantidad procesada y estado de
            consentimiento resultante.
        '400':
          description: X-Idempotency-Key ausente.
        '403':
          description: Un customer intentó operar sobre otro cliente.
        '404':
          description: Cliente no encontrado.
        '422':
          description: >-
            CONSENT_DOCUMENT_NOT_ACTIVE — algún consentDocumentId no está
            activo/vigente.
      security:
        - access-token: []
      summary: Registrar decisiones de consentimiento (batch)
      tags:
        - customer-privacy
  /customers/{customerId}/privacy/data-subject-requests:
    post:
      description: >-
        Registra una solicitud de acceso/rectificación/cancelación/oposición (o
        portabilidad/restricción) sobre los datos del cliente. El plazo legal de
        resolución (`dueAt`) se fija en 15 días desde la recepción.
      operationId: CustomerPrivacyController_createDataSubjectRequest
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestType:
                  type: string
                  enum:
                    - access
                    - rectification
                    - deletion
                    - portability
                    - revocation
                    - restriction
                description:
                  type: string
                  minLength: 5
                  maxLength: 1000
              required:
                - requestType
              additionalProperties: false
      responses:
        '201':
          description: Solicitud creada — estado "received", vence en 15 días.
        '400':
          description: X-Idempotency-Key ausente.
        '403':
          description: Un customer intentó operar sobre otro cliente.
        '404':
          description: Cliente no encontrado.
      security:
        - access-token: []
      summary: Crear solicitud de derechos ARCO/GDPR
      tags:
        - customer-privacy
  /customers/{customerId}/telemetry/batch:
    post:
      description: >-
        Recibe hasta 100 eventos + 100 métricas on-device por batch (interacción
        de formulario, permisos, auth, riesgo de dispositivo, SIM, reputación de
        IP, pasos de onboarding, acciones del cliente). Rechaza el batch
        completo si detecta indicios de volcado de agenda de contactos cruda
        (`RAW_CONTACTS_NOT_ALLOWED`). Un `customer` solo puede reportar
        telemetría de un dispositivo/sesión vinculados a sí mismo.
      operationId: CustomerTelemetryController_ingestBatch
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                deviceId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                clientBatchId:
                  type: string
                  minLength: 3
                  maxLength: 120
                capturedFrom:
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                capturedUntil:
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                events:
                  default: []
                  maxItems: 100
                  type: array
                  items:
                    type: object
                    properties:
                      eventType:
                        type: string
                        enum:
                          - form_field_interaction
                          - permission_event
                          - auth_event
                          - device_risk_event
                          - sim_observation
                          - ip_reputation_observation
                          - customer_observation
                          - customer_action
                          - onboarding_step_event
                      eventCode:
                        type: string
                        minLength: 1
                        maxLength: 120
                      occurredAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      metadata:
                        type: object
                        propertyNames:
                          type: string
                        additionalProperties: {}
                    required:
                      - eventType
                      - eventCode
                      - occurredAt
                    additionalProperties: false
                onDeviceMetrics:
                  default: []
                  maxItems: 100
                  type: array
                  items:
                    type: object
                    properties:
                      metricCode:
                        type: string
                        minLength: 1
                        maxLength: 120
                      value:
                        anyOf:
                          - type: number
                          - type: string
                            maxLength: 500
                          - type: boolean
                          - type: object
                            propertyNames:
                              type: string
                            additionalProperties: {}
                      computedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      confidenceScore:
                        type: number
                        minimum: 0
                        maximum: 1
                    required:
                      - metricCode
                      - value
                    additionalProperties: false
              required:
                - sessionId
                - deviceId
                - clientBatchId
                - capturedFrom
                - capturedUntil
                - events
                - onDeviceMetrics
              additionalProperties: false
      responses:
        '202':
          description: Batch aceptado — cantidad de eventos/métricas procesados.
        '400':
          description: X-Idempotency-Key ausente, batch vacío, o payload > 250 KB.
        '403':
          description: El dispositivo o la sesión no pertenecen al cliente.
        '404':
          description: Cliente no encontrado.
        '422':
          description: >-
            RAW_CONTACTS_NOT_ALLOWED — el batch contiene indicios de agenda de
            contactos cruda.
      security:
        - access-token: []
      summary: Ingerir batch de telemetría del cliente
      tags:
        - customer-telemetry
  /customers/{customerId}/risk-assessments:
    post:
      description: >-
        Calcula un score de riesgo/fraude nuevo para el cliente (identidad,
        contacto, dispositivo, comportamiento) y registra la decisión
        resultante. Exige al menos un consentimiento vigente otorgado antes de
        ejecutar. Si faltan datos obligatorios (documento de identidad, contacto
        verificado), la decisión resultante es `manual_review_required` y se
        crea automáticamente el caso de revisión manual correspondiente.
      operationId: RiskController_createRiskAssessment
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-idempotency-key
          in: header
          required: true
          schema:
            type: string
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assessmentType:
                  type: string
                  enum:
                    - onboarding_initial
                    - behavior_update
                    - manual_recheck
                    - fraud_recheck
                channel:
                  type: string
                  enum:
                    - mobile_app
                    - operations_panel
                    - system
                sessionId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                deviceId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                requestedLimitContext:
                  type: object
                  properties:
                    purpose:
                      type: string
                      minLength: 1
                      maxLength: 120
                  required:
                    - purpose
                  additionalProperties: false
              required:
                - assessmentType
                - channel
              additionalProperties: false
      responses:
        '201':
          description: >-
            Evaluación creada — decisión, nivel de riesgo, y razones (sin
            desglose de scores internos).
        '400':
          description: X-Idempotency-Key ausente, o x-tenant-id inválido.
        '404':
          description: Cliente no encontrado.
        '422':
          description: CUSTOMER_BLOCKED_FOR_RISK_ASSESSMENT o REQUIRED_CONSENT_MISSING.
      security:
        - access-token: []
      summary: Crear evaluación de riesgo
      tags:
        - risk
  /operations/risk-assessments/{riskAssessmentRunId}:
    get:
      description: >-
        Devuelve el desglose completo del modelo de riesgo (scores por
        dimensión, reason codes, versión de modelo/ruleset). Exclusivo de roles
        internos — nunca `customer`, para no exponer el detalle exacto del
        scoring al cliente evaluado.
      operationId: RiskController_getRiskAssessmentDetail
      parameters:
        - name: riskAssessmentRunId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle completo de la evaluación de riesgo.
        '404':
          description: Evaluación no encontrada.
      security:
        - access-token: []
      summary: Detalle de una evaluación de riesgo (operaciones)
      tags:
        - risk
  /operations/risk-assessments/{riskAssessmentRunId}/explanation:
    get:
      description: >-
        Devuelve la explicación legible (reason codes traducidos, factores que
        más pesaron) de una evaluación de riesgo.
      operationId: RiskController_getRiskAssessmentExplanation
      parameters:
        - name: riskAssessmentRunId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Explicación de la evaluación de riesgo.
        '404':
          description: Evaluación no encontrada.
      security:
        - access-token: []
      summary: Explicación de una evaluación de riesgo (operaciones)
      tags:
        - risk
  /external-data/consents:
    post:
      description: >-
        Registra el consentimiento del cliente para consultar un proveedor de
        datos externos específico (KYC, buró, telco, etc.).
      operationId: ExternalDataController_createConsent
      parameters:
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: string
                  pattern: ^\d+$
                providerCode: {}
                purpose:
                  type: string
                  minLength: 3
                  maxLength: 100
                legalTextVersion:
                  default: v1
                  type: string
                  minLength: 1
                  maxLength: 80
                accepted:
                  default: true
                  type: boolean
                channel:
                  default: api
                  type: string
                  minLength: 2
                  maxLength: 40
                sessionId:
                  type: string
                  pattern: ^\d+$
                deviceFingerprintSnapshot:
                  type: string
                  maxLength: 180
              required:
                - customerId
                - purpose
                - legalTextVersion
                - accepted
                - channel
              additionalProperties: false
      responses:
        '201':
          description: Consentimiento registrado.
        '403':
          description: Un customer intentó registrar consentimiento para otro cliente.
      security:
        - access-token: []
      summary: Registrar consentimiento para un proveedor externo
