  /auth/login:
    post:
      description: >-
        Autentica a un `customer`, `internal_user` o `platform_user` y emite un
        access+refresh token. El identificador de login depende de `actorType`:
        para `customer` es el mismo teléfono/email usado en onboarding; para
        `internal_user`/`platform_user` es el email corporativo. Bloquea
        temporalmente tras `AUTH_MAX_FAILED_LOGIN_ATTEMPTS` intentos fallidos
        consecutivos (`AUTH_LOCKOUT_MINUTES`).
      operationId: AuthController_login
      parameters:
        - name: x-tenant-id
          in: header
          description: Tenant al que pertenece el actor (entero positivo como string).
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actorType:
                  type: string
                  enum:
                    - customer
                    - internal_user
                    - platform_user
                identifier:
                  type: string
                  minLength: 3
                  maxLength: 180
                password:
                  type: string
                  minLength: 1
                  maxLength: 128
              required:
                - actorType
                - identifier
                - password
              additionalProperties: false
      responses:
        '200':
          description: Login exitoso — access token + refresh token.
        '400':
          description: x-tenant-id ausente o no es un entero positivo válido.
        '401':
          description: >-
            Credenciales inválidas, o cuenta bloqueada temporalmente por
            intentos fallidos.
      summary: Login
      tags:
        - auth
  /auth/refresh:
    post:
      description: >-
        Rota un refresh token vigente por un nuevo access+refresh token
        (rotación en cada uso — el refresh token anterior queda revocado).
      operationId: AuthController_refresh
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  minLength: 20
              required:
                - refreshToken
              additionalProperties: false
      responses:
        '200':
          description: Rotación exitosa — nuevo access token + refresh token.
        '401':
          description: >-
            Refresh token inválido, expirado, o el actor asociado ya no está
            disponible.
      summary: Refresh
      tags:
        - auth
  /auth/logout:
    post:
      description: >-
        Revoca un refresh token (o todos los refresh tokens vigentes del mismo
        actor, si `allDevices=true`). Idempotente: revocar un token ya revocado
        no falla.
      operationId: AuthController_logout
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  minLength: 20
                allDevices:
                  default: false
                  type: boolean
              required:
                - refreshToken
                - allDevices
              additionalProperties: false
      responses:
        '200':
          description: >-
            Logout procesado (siempre, incluso si el token ya estaba revocado o
            no existía).
      summary: Logout
      tags:
        - auth
  /auth/provision-credentials:
    post:
      description: >-
        Crea la contraseña inicial de un `internal_user` o `platform_user` ya
        existente (creado por seed/migración, sin credenciales todavía).
        Requiere un access token vigente con rol `admin` o `platform_admin` —
        verificado tanto por el guard de roles como, en defensa en profundidad,
        dentro del propio `AuthService`.
      operationId: AuthController_provisionCredentials
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actorType:
                  type: string
                  enum:
                    - internal_user
                    - platform_user
                actorId:
                  type: string
                  pattern: ^[1-9][0-9]*$
                password:
                  type: string
                  minLength: 10
                  maxLength: 128
              required:
                - actorType
                - actorId
                - password
              additionalProperties: false
      responses:
        '201':
          description: Credenciales provisionadas correctamente.
        '401':
          description: >-
            La contraseña no cumple el mínimo de seguridad requerido, o el actor
            indicado no existe.
        '403':
          description: El actor autenticado no tiene rol admin/platform_admin.
        '409':
          description: >-
            CREDENTIALS_ALREADY_PROVISIONED — el actor ya tiene contraseña
            configurada.
      security:
        - access-token: []
      summary: Provisionar credenciales
      tags:
        - auth
  /customers/{customerId}/me:
    get:
      description: >-
        Devuelve el perfil vigente del cliente: datos de identidad, contactos,
        consentimientos otorgados y el último resultado de riesgo reducido
        (decisión + nivel, sin el desglose completo del modelo). Un `customer`
        solo puede leer su propio perfil (`assertOwnCustomerResource`); los
        roles internos listados pueden leer el de cualquier cliente del tenant.
      operationId: CustomersController_getCustomerMe
      parameters:
        - name: customerId
          required: true
          in: path
          schema:
            type: string
            pattern: ^[1-9][0-9]*$
          description: Id numérico del cliente.
        - name: x-tenant-id
          in: header
          description: >-
            Opcional para `customer` (se toma del token); requerido para roles
            internos.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Perfil del cliente.
        '400':
          description: x-tenant-id ausente o no es un entero positivo válido.
        '403':
          description: Un actor con rol customer intentó leer el perfil de otro cliente.
        '404':
          description: Cliente no encontrado.
      security:
        - access-token: []
      summary: Perfil resumido del cliente ("mi perfil")
      tags:
        - customers
